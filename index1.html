<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting to Catalyst Magazine</title>
    <link rel="icon" type="image/png" href="https://static.wixstatic.com/media/11b1c4_d0a154e8ddf24787a03381f78041bd54~mv2.png">
    <meta http-equiv="refresh" content="0; url=https://catalyst-magazine.com/admin/login" />
    <link rel="canonical" href="https://catalyst-magazine.com/admin/login" />
    <script>
      window.location.replace("https://catalyst-magazine.com/admin/login");
    </script>
    <style>
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        background: #fafafa;
        color: #333;
      }
      .redirect-message {
        text-align: center;
        padding: 2rem;
      }
      a {
        color: #0066cc;
      }
    </style>
  </head>
  <body>
    <div class="redirect-message">
      <p>Redirecting to Catalyst Magazine…</p>
      <p>If you are not redirected automatically, <a href="https://catalyst-magazine.com/admin/login">click here</a>.</p>
    </div>
  </body>
</html>
